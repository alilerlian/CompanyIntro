<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日股票故事庫</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      margin: 0;
      padding: 0;
      -webkit-text-size-adjust: 100%;
    }

    /* 🎨 元件基礎樣式 (保留你的美觀設計) */
    .main-card {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.04), 0 4px 12px -2px rgba(15, 23, 42, 0.02);
      border: 1px solid #e2e8f0;
    }

    .search-input { width: 100%; padding: 12px 16px 12px 42px; font-weight: 700; border: 1px solid #cbd5e1; border-radius: 16px; box-sizing: border-box; outline: none; transition: all 0.2s; }
    .search-input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .search-dropdown { position: absolute; top: 52px; left: 0; width: 100%; background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 12px 20px rgba(0,0,0,0.1); z-index: 99; max-height: 250px; overflow-y: auto; padding: 6px; }
    .search-item { padding: 10px 14px; border-radius: 10px; font-weight: 700; color: #334155; cursor: pointer; display: flex; justify-content: space-between; transition: background 0.2s; }
    .search-item:hover { background: #f1f5f9; color: #2563eb; }

    .nav-button { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .nav-button:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .date-picker { border: none; background: transparent; text-align: center; outline: none; color: #0f172a; cursor: pointer; }

    .return-badge { border-radius: 12px; font-weight: 900; display: flex; align-items: center; gap: 2px; }
    .return-up { background: #fee2e2; color: #dc2626; }
    .return-down { background: #dcfce7; color: #16a34a; }

    .track-badge { background: #edf2f7; color: #4a5568; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; }
    .trend-tag { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 12px; display: inline-block; }
    
    [v-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

  <div id="app" class="w-full max-w-3xl mx-auto px-4 py-6 md:px-8 md:py-12 pb-20" v-cloak>
    
    <section class="relative mb-4 md:mb-6">
      <span class="material-icons absolute left-3 md:left-4 top-3 md:top-3.5 text-slate-400 text-lg md:text-xl pointer-events-none">search</span>
      <input type="text" v-model="searchQuery" @input="onSearchInput" class="search-input text-[15px] md:text-[17px] md:py-3.5 md:pl-12" placeholder="輸入股票代碼或公司名稱搜尋歷史庫存...">
      
      <div v-if="searchResults.length > 0" class="search-dropdown">
        <div v-for="item in searchResults" :key="item.index" @click="selectSearchResult(item.index)" class="search-item text-[14px] md:text-[15px]">
          <span>📈 {{ item.company_name }}</span>
          <span class="text-slate-400 text-[12px] md:text-[13px]">{{ item.date }}</span>
        </div>
      </div>
    </section>

    <nav class="bg-white rounded-[18px] p-3 md:p-4 mb-5 md:mb-8 border border-slate-200 flex items-center justify-between shadow-sm">
      <button @click="changeStory(-1)" class="nav-button px-4 py-2.5 md:px-5 md:py-3 text-[14px] md:text-[15px] font-extrabold">
        <span class="material-icons text-[15px] md:text-[17px]">arrow_back_ios</span> <span class="hidden md:inline">舊一則</span>
      </button>
      
      <div class="flex flex-col items-center">
        <input type="date" v-model="selectedDate" @change="jumpToDate" class="date-picker text-[14px] md:text-[16px] font-extrabold">
      </div>
      
      <button @click="changeStory(1)" class="nav-button px-4 py-2.5 md:px-5 md:py-3 text-[14px] md:text-[15px] font-extrabold">
        <span class="hidden md:inline">新一則</span> <span class="material-icons text-[15px] md:text-[17px]">arrow_forward_ios</span>
      </button>
    </nav>

    <section v-if="story && !loading" class="bg-gradient-to-br from-slate-50 to-slate-100 rounded-[20px] border border-slate-200 p-4 md:p-6 mb-4 md:mb-6 flex items-center justify-between shadow-sm">
      <div class="flex flex-col">
        <span class="text-[11px] md:text-[13px] font-extrabold text-slate-500 mb-0.5 flex items-center gap-1"><span class="material-icons text-
